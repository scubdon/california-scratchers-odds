name: Refresh data & deploy

# Re-scrapes the California Lottery Scratchers data and republishes the static page to
# GitHub Pages.
# - on a daily schedule (keeps the odds current)
# - on every push to main (so code changes ship)
# - manually via the Actions tab

on:
  schedule:
    - cron: "17 11 * * *"   # 11:17 UTC daily
  push:
    branches: [main]
    paths-ignore:
      - "data/**"           # don't re-trigger on our own snapshot commits
  workflow_dispatch:

permissions:
  contents: write           # write: commit the daily Parquet snapshot back to the repo
  pages: write
  id-token: write

# Let a running deploy finish; only keep the latest queued run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape latest Scratchers data
        run: python scraper/scrape.py

      # Record one snapshot per day into the append-only Parquet history and
      # commit it back. Skipped on push events: those are code changes, not
      # daily data points, and committing on a push would re-trigger this
      # workflow. (paths-ignore + [skip ci] are belt-and-suspenders against that.)
      - name: Record daily snapshot to history
        if: github.event_name != 'push'
        run: python scraper/record_snapshot.py

      - name: Commit snapshot
        if: github.event_name != 'push'
        run: |
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Record Scratchers snapshot $(date -u +%Y-%m-%d) [skip ci]"
          git push

      - name: Cache-bust CSS/JS with content hashes
        run: python scraper/stamp_assets.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
